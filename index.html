<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JuliApp">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#6C5CE7">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/app-icon.png">
    <link rel="stylesheet" href="css/styles.css">
    <title>JuliApp</title>
</head>
<body>
    <!-- SCREEN: Menu principal (3 secciones grandes) -->
    <div id="screen-menu" class="screen active">
        <div class="menu-bg">
            <div class="menu-title">
                <svg viewBox="0 0 200 60" class="title-svg">
                    <text x="100" y="45" text-anchor="middle" font-size="42" font-weight="bold" fill="#FF6B6B" stroke="#fff" stroke-width="3" paint-order="stroke">JuliApp!</text>
                </svg>
            </div>
            <div class="main-sections">
                <button class="section-card" id="sec-colorear">
                    <div class="section-icon">
                        <svg viewBox="0 0 80 80"><path d="M20 65V30l20-20 20 20v35z" fill="#FF6B6B" opacity="0.9"/><path d="M55 45c0 0 10 10 10 16s-4.5 6-10 6-10-1-10-6 10-16 10-16z" fill="#4488FF" opacity="0.8"/></svg>
                    </div>
                    <div class="section-label">Colorear</div>
                </button>
                <button class="section-card" id="sec-trazar">
                    <div class="section-icon">
                        <svg viewBox="0 0 80 80"><path d="M15 60l4-14L55 10l8 8L27 54z" fill="none" stroke="#FFB300" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><path d="M55 10l8 8" stroke="#FFB300" stroke-width="5" stroke-linecap="round"/><circle cx="20" cy="58" r="4" fill="#FFB300"/></svg>
                    </div>
                    <div class="section-label">Trazar</div>
                </button>
                <button class="section-card" id="sec-galeria">
                    <div class="section-icon">
                        <svg viewBox="0 0 80 80"><rect x="8" y="8" width="26" height="26" rx="5" fill="#66BB6A"/><rect x="42" y="8" width="26" height="26" rx="5" fill="#42A5F5"/><rect x="8" y="42" width="26" height="26" rx="5" fill="#FF69B4"/><rect x="42" y="42" width="26" height="26" rx="5" fill="#FFB74D"/></svg>
                    </div>
                    <div class="section-label">Mis Dibujos</div>
                </button>
            </div>
        </div>
    </div>

    <!-- SCREEN: Lista de dibujos (colorear o trazar) -->
    <div id="screen-list" class="screen">
        <div class="menu-bg">
            <div class="list-header">
                <button id="list-back" class="circle-btn" aria-label="Volver">
                    <svg viewBox="0 0 48 48"><path d="M30 12L18 24l12 12" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <div id="list-title" class="list-title-text">Colorear</div>
                <div style="width:52px"></div>
            </div>
            <div id="list-tabs" class="category-tabs"></div>
            <div id="list-grid" class="drawing-grid"></div>
        </div>
    </div>

    <!-- SCREEN: Galeria -->
    <div id="screen-gallery" class="screen">
        <div class="gallery-bg">
            <div class="gallery-header">
                <button id="gallery-back" class="circle-btn" aria-label="Volver">
                    <svg viewBox="0 0 48 48"><path d="M30 12L18 24l12 12" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <div class="gallery-title">Mis Dibujos</div>
                <div style="width:52px"></div>
            </div>
            <div id="saved-gallery-grid" class="saved-gallery-grid"></div>
        </div>
    </div>

    <!-- SCREEN: Dibujo guiado -->
    <div id="screen-draw" class="screen">
        <canvas id="guide-canvas"></canvas>
        <canvas id="draw-canvas"></canvas>

        <!-- Top bar -->
        <div id="draw-top-bar">
            <button id="btn-back" class="circle-btn" aria-label="Volver">
                <svg viewBox="0 0 48 48"><path d="M30 12L18 24l12 12" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div id="step-indicators" class="step-indicators"></div>
            <button id="btn-undo" class="circle-btn" aria-label="Deshacer">
                <svg viewBox="0 0 48 48"><path d="M14 20l-8 8 8 8" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 28h24c6 0 12-4 12-12" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round"/></svg>
            </button>
        </div>

        <!-- Color palette (bottom) -->
        <div id="draw-bottom-bar">
            <div id="color-dots" class="color-dots"></div>
        </div>

        <!-- Step instruction overlay -->
        <div id="step-hint" class="step-hint hidden"></div>
    </div>

    <!-- SCREEN: Completado -->
    <div id="screen-done" class="screen">
        <div class="done-content">
            <div class="done-stars">
                <svg viewBox="0 0 48 48" class="star star-1"><path d="M24 4l6 12 14 2-10 10 2 14-12-6-12 6 2-14L4 18l14-2z" fill="#FFD700"/></svg>
                <svg viewBox="0 0 48 48" class="star star-2"><path d="M24 4l6 12 14 2-10 10 2 14-12-6-12 6 2-14L4 18l14-2z" fill="#FFD700"/></svg>
                <svg viewBox="0 0 48 48" class="star star-3"><path d="M24 4l6 12 14 2-10 10 2 14-12-6-12 6 2-14L4 18l14-2z" fill="#FFD700"/></svg>
            </div>
            <canvas id="result-canvas" class="result-canvas"></canvas>
            <div class="done-buttons">
                <button id="btn-replay" class="pill-btn green">
                    <svg viewBox="0 0 48 48" width="36" height="36"><path d="M12 8v32l28-16z" fill="white"/></svg>
                </button>
                <button id="btn-menu" class="pill-btn purple">
                    <svg viewBox="0 0 48 48" width="36" height="36"><rect x="6" y="6" width="14" height="14" rx="3" fill="white"/><rect x="26" y="6" width="14" height="14" rx="3" fill="white"/><rect x="6" y="26" width="14" height="14" rx="3" fill="white"/><rect x="26" y="26" width="14" height="14" rx="3" fill="white"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- SCREEN: Colorear -->
    <div id="screen-color" class="screen">
        <canvas id="fill-canvas"></canvas>
        <canvas id="color-canvas"></canvas>
        <canvas id="paint-canvas"></canvas>

        <!-- Top bar -->
        <div id="color-top-bar" class="color-top-bar">
            <button id="color-btn-back" class="circle-btn" aria-label="Volver">
                <svg viewBox="0 0 48 48"><path d="M30 12L18 24l12 12" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="mode-toggle">
                <button id="color-btn-undo" class="mode-btn" aria-label="Deshacer">
                    <svg viewBox="0 0 48 48"><path d="M14 20l-8 8 8 8" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 28h24c6 0 12-4 12-12" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round"/></svg>
                </button>
                <button id="mode-fill" class="mode-btn active" aria-label="Rellenar">
                    <svg viewBox="0 0 48 48"><path d="M12 36V20l12-12 12 12v16z" fill="white" opacity="0.9"/><path d="M32 28c0 0 6 6 6 10s-2.7 4-6 4-6-0.7-6-4 6-10 6-10z" fill="white" opacity="0.7"/></svg>
                </button>
                <button id="mode-paint" class="mode-btn" aria-label="Pintar">
                    <svg viewBox="0 0 48 48"><path d="M8 36l2-8L34 4l6 6L16 34z" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/></svg>
                </button>
            </div>
            <div class="color-top-right">
                <button id="color-btn-save" class="circle-btn" aria-label="Guardar">
                    <svg viewBox="0 0 48 48"><path d="M8 8h24l8 8v24H8z" fill="none" stroke="white" stroke-width="3"/><rect x="14" y="28" width="20" height="12" rx="2" fill="white" opacity="0.5"/><path d="M18 8v10h12V8" fill="none" stroke="white" stroke-width="2"/></svg>
                </button>
                <button id="color-btn-download" class="circle-btn" aria-label="Descargar">
                    <svg viewBox="0 0 48 48"><path d="M24 6v28M16 26l8 8 8-8" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 38h32" stroke="white" stroke-width="3.5" stroke-linecap="round"/></svg>
                </button>
                <button id="color-btn-clear" class="circle-btn" aria-label="Borrar">
                    <svg viewBox="0 0 48 48"><path d="M12 14h24M18 14V10h12v4M14 14l2 24h16l2-24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
        </div>

        <!-- Bottom palette -->
        <div id="color-bottom-bar" class="color-bottom-bar">
            <div id="color-palette-dots" class="color-dots"></div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/sounds.js"></script>
    <script src="js/templates.js"></script>
    <script src="js/coloring-pages.js"></script>
    <script src="js/guide.js"></script>
    <script src="js/coloring.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
